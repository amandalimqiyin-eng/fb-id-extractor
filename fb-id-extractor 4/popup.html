<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      background: #fff;
      color: #111;
    }

    .header {
      background: #1877F2;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: white;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
    }

    .content { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .field { display: flex; flex-direction: column; gap: 4px; }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .value {
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #111;
      flex: 1;
      word-break: break-all;
    }

    .value.empty { color: #bbb; font-style: italic; font-family: inherit; }

    .copy-btn {
      background: white;
      border: 0.5px solid #ddd;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: #1877F2;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .copy-btn:hover { background: #f0f6ff; }
    .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .copy-btn.copied { color: #27ae60; border-color: #27ae60; }

    .divider { height: 0.5px; background: #eee; }

    .full-url .value {
      font-size: 12px;
      color: #1877F2;
    }

    .copy-all-btn {
      width: 100%;
      padding: 10px;
      background: #1877F2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 2px;
    }

    .copy-all-btn:hover { background: #1565d8; }
    .copy-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .copy-all-btn.copied { background: #27ae60; }

    .error {
      background: #fff5f5;
      border: 0.5px solid #fcc;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #c0392b;
      line-height: 1.5;
    }

    .not-fb {
      padding: 20px 16px;
      text-align: center;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }

    .not-fb strong { color: #111; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
      <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
    </svg>
    <div class="header-text">
      <h1>FB ID Extractor</h1>
      <p>Extract Page ID &amp; Post ID instantly</p>
    </div>
  </div>

  <div id="main"></div>

  <script src="popup.js"></script>
</body>
</html>
